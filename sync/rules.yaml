# Patterns are matched as case-insensitive substrings.

job_filter:
  # Skip the email entirely unless subject or body contains one of these.
  - engineer
  - developer
  - software
  - swe
  - intern

# Status rules are evaluated in this order; first match wins.
status_order:
  - offer
  - next_step
  - rejected
  - applied

status_patterns:
  applied:
    - "thank you for applying"
    - "we received your application"
    - "application received"
    - "thanks for your interest"
  rejected:
    - "unfortunately"
    - "we have decided to move forward with other candidates"
    - "not moving forward"
    - "no longer being considered"
    - "we will not be progressing"
  next_step:
    - "next step"
    - "schedule a"
    - "phone screen"
    - "interview"
    - "would you be available"
    - "recruiter would like to"
  offer:
    - "we are pleased to extend"
    - "offer letter"
    - "formal offer"

# Sender domains we know are ATSes; used for company-name parsing hints.
ats_senders:
  greenhouse:
    - "greenhouse.io"
    - "us.greenhouse-mail.io"
  lever:
    - "hire.lever.co"
    - "jobs.lever.co"
  workday:
    - "myworkday.com"
    - "myworkdayjobs.com"
  ashby:
    - "ashbyhq.com"
  smartrecruiters:
    - "smartrecruiters.com"
  icims:
    - "icims.com"

# Suffixes to strip when deriving a company name from a sender display name.
company_suffix_strip:
  - "Recruiting"
  - "Recruiting Team"
  - "Talent Acquisition"
  - "Talent Team"
  - "Talent"
  - "Hiring Team"
  - "Hiring"
  - "Careers"
  - "People Team"
  - "People"
  - "HR"
  - "no-reply"
  - "noreply"

# Prefixes to strip from a sender display name. Addresses like
# "do-not-reply adobe" should yield "adobe" once the prefix is removed.
company_prefix_strip:
  - "do-not-reply"
  - "do not reply"
  - "no-reply"
  - "noreply"
  - "Recruiting Team at"
  - "Hiring Team at"
  - "Careers at"

# Subdomains that are not the company name. Used to walk past "mail." or
# "careers." when falling back to the email domain for the company.
generic_subdomains:
  - mail
  - careers
  - career
  - hire
  - hiring
  - jobs
  - apply
  - app
  - info
  - hello
  - no-reply
  - noreply
  - notifications
  - notify
